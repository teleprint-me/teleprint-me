{% extends 'base.html' %}

{% block main %}
    <h2 class="border-bottom m-3 p-3">Login</h2>

    <form class="d-flex flex-column bg-light rounded mx-auto m-3 p-3 shadow w-50 needs-validation" 
          enctype="application/x-www-form-urlencoded" 
          action="/auth/login" 
          method="post"
          novalidate>

        <div class="form-floating mb-3">
            <input type="email" 
                   name="email" 
                   class="form-control" 
                   id="floatingInput" 
                   placeholder="name@example.com"
                   required>
            <label for="floatingInput">Email address</label>
            <div class="invalid-feedback">
                Please provide a email.
            </div>
        </div>

        <div class="form-floating mb-3">
            <input type="password" 
                   name="password" 
                   class="form-control" 
                   id="floatingPassword" 
                   placeholder="Password"
                   required>
            <label for="floatingPassword">Password</label>
            <div class="invalid-feedback">
                Please provide a password.
            </div>
        </div>

        <button type="submit" name="submit" class="btn btn-primary w-100 mb-3">Sign in</button>

        <a href="/auth/register" class="btn btn-primary w-100">Sign up</a>
    </form>
{% endblock %}

{% block scripts %}
    <script charset="utf-8">
        let form = document.querySelector('form');

        let modifyFormWidth = () => {
            if (window.innerWidth < 768) {
                form.classList.replace('w-50', 'w-100');
            } else {
                form.classList.replace('w-100', 'w-50');
            }
        }

        ['load', 'resize'].forEach((event) => {
            window.addEventListener(event, modifyFormWidth);
        });

        form.addEventListener('submit', (event) => {
            if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            }

            form.classList.add('was-validated')
        }, false);
    </script>
{% endblock %}
