{% extends 'base.html' %}

{% block main %}
    <nav class="mt-3" aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/menu">Menu</a></li>
            <li class="breadcrumb-item"><a href="/setting/menu">Settings</a></li>
            <li class="breadcrumb-item active" aria-current="page">Read</li>
        </ol>
    </nav>

    <div class="list-group bg-light rounded shadow mx-auto">
        {% for key, value in context.items() %}
            <a href="#{{key}}" 
               class="list-group-item list-group-item-action list-group-item-primary"
               type="button"
               data-bs-toggle="tooltip"
               data-bs-placement="top"
               title="click to activate this interface">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">{{key}}</h5>
                    <small class="text-muted">Read</small>
                </div>
                <p class="mb-1">{{value}}</p>
            </a>
        {% endfor %}
    </div>
{% endblock %}
