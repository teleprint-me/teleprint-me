{% extends 'base.html' %}

{% block main %}
    <nav class="mt-3" aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/menu">Menu</a></li>
            <li class="breadcrumb-item"><a href="/strategy/menu">Strategies</a></li>
            <li class="breadcrumb-item active" aria-current="page">Delete</li>
        </ol>
    </nav>

    <div class="list-group bg-light rounded shadow mx-auto">
        {% for strategy in g.strategies %}
            <a href="/strategy/delete?platform={{strategy['platform']}}&asset={{strategy['asset']}}"
               class="list-group-item list-group-item-action list-group-item-danger"
               type="button"
               data-bs-toggle="tooltip"
               data-bs-placement="top"
               title="click to delete this account entry">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">{{strategy['platform']}}</h5>
                    <small>Delete</small>
                </div>
                <div class="d-flex w-100 justify-content-between">
                    <p class="mb-1">{{strategy['asset']}}</p>
                    <p class="mb-1">{{strategy['strategy']}}</p>
                </div>
            </a>
        {% else %}
            <a href="/strategy/create" class="list-group-item list-group-item-action">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">Strategies</h5>
                    <small class="text-muted">Create</small>
                </div>
                <p class="mb-1">There are no existing strategies.</p>
            </a>
        {% endfor %}
    </div>
{% endblock %}
